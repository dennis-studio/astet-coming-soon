<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astet</title>

  <!-- Favicon -->
  <link rel="icon" type="image/jpeg" href="assets/favicon.jpg" />
  <link rel="apple-touch-icon" href="assets/favicon.jpg" />

  <!-- SEO -->
  <meta name="description" content="Our new website is coming soon. For enquiries, contact hello@astetstudio.com" />

  <!-- Open Graph / social sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.astetstudio.com/" />
  <meta property="og:title" content="Astet" />
  <meta property="og:description" content="Our new website is coming soon. For enquiries, contact hello@astetstudio.com" />
  <meta property="og:image" content="assets/og-image.jpg" />

  <!-- Twitter card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Astet" />
  <meta name="twitter:description" content="Our new website is coming soon. For enquiries, contact hello@astetstudio.com" />
  <meta name="twitter:image" content="assets/og-image.jpg" />
  <style>
    @font-face {
      font-family: 'Practice';
      src: url('assets/fonts/Practice-Regular.woff2') format('woff2'),
           url('assets/fonts/Practice-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --beige: #F9F9F6;
      --logo-width: 147px;
      --font-size: 20px;
      --line-height: 115%;
    }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Practice', serif;
      font-size: var(--font-size);
      font-weight: 400;
      line-height: var(--line-height);
      color: var(--beige);
      background-color: #1a1008;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      min-height: 100vh;
      min-height: 100dvh;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* Overlay via pseudo-element */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: linear-gradient(
        135deg,
        rgba(0, 0, 0, 0.35) 0%,
        rgba(0, 0, 0, 0.0) 60%
      );
      z-index: 0;
      pointer-events: none;
    }

    /* Content layer */
    .content {
      position: relative;
      z-index: 1;
      padding: 40px 48px;
      display: flex;
      flex-direction: row;
      align-items: flex-end;
      gap: 48px;
    }

    /* Logo */
    .logo {
      flex-shrink: 0;
      width: var(--logo-width);
    }

    .logo svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* Text block */
    .text {
      margin-bottom: -4px; /* pull text down so baseline aligns with logo bottom */
    }

    .text p {
      font-family: 'Practice', serif;
      font-size: var(--font-size);
      font-weight: 400;
      line-height: var(--line-height);
      color: var(--beige);
      font-style: normal;
    }

    .text .line2 {
      margin-top: 0; /* gap added in mobile breakpoint only */
    }

    .mobile-break {
      display: none;
    }

    .text a {
      color: #A4A4A4;
      text-decoration: none;
      transition: text-decoration 0.15s ease;
    }

    .text a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    /* Fade-in animation */
    .content {
      opacity: 0;
      animation: fadeIn 1s ease 0.3s forwards;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Stack below logo the moment viewport can't fit both on one line */
    @media (max-width: 720px) {
      .content {
        flex-direction: column;
        align-items: flex-start;
        padding: 28px 24px;
        gap: 16px;
      }

      .logo {
        width: 110px;
      }

      .text {
        margin-bottom: 0;
      }


      .text .line2 {
        margin-top: 0.75em;
      }

      .mobile-break {
        display: inline;
      }
    }
  </style>
</head>
<body>

  <!-- Content -->
  <div class="content">

        </g>
      </svg>
    </div>

    <!-- Text -->
    <div class="text">
      <p class="line1">Astet is evolving. Our new <span class="mobile-break"><br></span>website will launch soon.</p>
      <p class="line2">For enquiries, please contact <span class="mobile-break"><br></span><a href="mailto:hello@astetstudio.com">hello@astetstudio.com</a></p>
    </div>

  </div>

  <script>
    // Pick a random background image on each page load
    const images = [
      'assets/images/bg-1.jpg',
      'assets/images/bg-2.jpg',
      'assets/images/bg-3.jpg',
      'assets/images/bg-4.jpg',
    ];

    const chosen = images[Math.floor(Math.random() * images.length)];
    document.body.style.backgroundImage = "url('" + chosen + "')";
  </script>

</body>
</html>
